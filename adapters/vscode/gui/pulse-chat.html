<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Agent</title>
  <style>
    :root {
      --bg: var(--vscode-sideBar-background, #1e1e1e);
      --fg: var(--vscode-editor-foreground, #e6e6e6);
      --input-bg: var(--vscode-input-background, #2d2d2d);
      --input-fg: var(--vscode-input-foreground, #e6e6e6);
      --border: var(--vscode-panel-border, #2a2a2a);
      --accent: var(--vscode-button-background, #2c5aa0);
      --accent-hover: var(--vscode-button-hoverBackground, #3a6db3);
      --accent-fg: var(--vscode-button-foreground, #fff);
      --text-muted: var(--vscode-descriptionForeground, #b3b3b3);
      --text-dim: var(--vscode-list-deemphasizedForeground, #8c8c8c);
      --msg-user-bg: var(--vscode-list-activeSelectionBackground, #2c5aa050);
      --msg-assistant-bg: transparent;
      --hover-bg: var(--vscode-list-hoverBackground, #383838);
      --active-bg: var(--vscode-list-activeSelectionBackground, #2c5aa050);
      --error-fg: var(--vscode-editorError-foreground, #f44336);
      --warning-fg: var(--vscode-editorWarning-foreground, #ffb74d);
      --success-fg: #4caf50;
      --card-bg: var(--vscode-editor-background, #1e1e1e);
      --radius: 6px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif; font-size:13px; color:var(--fg); background:var(--bg); }
    #app { display:flex; height:100%; }

    /* ─── SIDEBAR ─── */
    #sidebar { width:0; overflow:hidden; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--card-bg); transition:width .2s; flex-shrink:0; }
    #sidebar.open { width:220px; }
    #sidebar h3 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); padding:12px 12px 6px; }
    #session-list { flex:1; overflow-y:auto; padding:0 8px; }
    .session-item { padding:6px 8px; border-radius:4px; cursor:pointer; font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .session-item:hover { background:var(--hover-bg); color:var(--fg); }
    .session-item.active { background:var(--active-bg); color:var(--fg); }
    #new-session-btn { margin:8px; padding:6px; text-align:center; border:1px dashed var(--border); border-radius:4px; color:var(--text-muted); font-size:12px; cursor:pointer; }
    #new-session-btn:hover { border-color:var(--accent); color:var(--fg); }

    /* ─── MAIN ─── */
    #main { flex:1; display:flex; flex-direction:column; min-width:0; }

    /* ─── HEADER ─── */
    #header { display:flex; align-items:center; gap:6px; padding:6px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #sidebar-toggle { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px; border-radius:4px; font-size:14px; }
    #sidebar-toggle:hover { background:var(--hover-bg); color:var(--fg); }
    #header .logo { width:18px; height:18px; background:var(--accent); border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-weight:700; flex-shrink:0; }
    #header h1 { font-size:13px; font-weight:600; flex:1; }

    /* Mode tabs */
    #mode-tabs { display:flex; gap:2px; }
    .mode-tab { padding:3px 10px; font-size:11px; border-radius:10px; cursor:pointer; border:none; background:transparent; color:var(--text-muted); transition:all .15s; }
    .mode-tab:hover { color:var(--fg); background:var(--hover-bg); }
    .mode-tab.active { background:var(--accent); color:var(--accent-fg); }

    /* Model badge */
    #model-select { font-size:11px; color:var(--text-muted); background:var(--input-bg); border:1px solid var(--border); padding:2px 8px; border-radius:10px; cursor:pointer; max-width:140px; }
    #model-select:hover { border-color:var(--accent); }

    /* ─── MESSAGES ─── */
    #messages { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:6px; scrollbar-width:thin; }
    #messages:empty::after { content:'Send a message to start.'; display:block; color:var(--text-dim); text-align:center; padding:40px 20px; font-size:13px; }
    #messages:empty:not(:empty)::after { display:none; }

    .msg { max-width:92%; padding:8px 12px; border-radius:8px; line-height:1.5; word-wrap:break-word; animation:fadeIn .15s ease-out; position:relative; }
    .msg.user { align-self:flex-end; background:var(--msg-user-bg); border-bottom-right-radius:4px; }
    .msg.assistant { align-self:flex-start; background:var(--msg-assistant-bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .msg.system { align-self:center; font-size:11px; color:var(--text-muted); border:none; padding:4px 12px; background:transparent; }
    .msg .role-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); margin-bottom:4px; display:block; }
    .msg .content { white-space:pre-wrap; }
    .msg .content pre { background:var(--input-bg); padding:8px; border-radius:4px; overflow-x:auto; font-size:12px; margin:6px 0; font-family:'JetBrains Mono','Fira Code',monospace; }
    .msg .content code { font-family:'JetBrains Mono','Fira Code',monospace; font-size:12px; background:var(--input-bg); padding:1px 4px; border-radius:3px; }
    .msg .content p { margin:4px 0; }
    .msg .content ul, .msg .content ol { margin:4px 0; padding-left:20px; }

    /* Message actions */
    .msg-actions { display:none; position:absolute; top:-20px; right:4px; gap:2px; background:var(--card-bg); border:1px solid var(--border); border-radius:4px; padding:2px; }
    .msg:hover .msg-actions { display:flex; }
    .msg-actions button { background:none; border:none; color:var(--text-muted); padding:2px 5px; font-size:11px; cursor:pointer; border-radius:3px; }
    .msg-actions button:hover { background:var(--hover-bg); color:var(--fg); }

    /* ─── TOOL CALL CARDS ─── */
    .tool-card { border:1px solid var(--border); border-radius:6px; margin:6px 0; overflow:hidden; background:var(--card-bg); }
    .tool-card-header { display:flex; align-items:center; gap:6px; padding:6px 10px; cursor:pointer; user-select:none; }
    .tool-card-header:hover { background:var(--hover-bg); }
    .tool-card-status { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .tool-card-status.pending { background:var(--text-dim); }
    .tool-card-status.running { background:var(--warning-fg); animation:pulse 1s infinite; }
    .tool-card-status.success { background:var(--success-fg); }
    .tool-card-status.error { background:var(--error-fg); }
    .tool-card-name { font-size:12px; font-weight:500; flex:1; }
    .tool-card-duration { font-size:10px; color:var(--text-dim); }
    .tool-card-arrow { font-size:10px; color:var(--text-dim); transition:transform .15s; }
    .tool-card-arrow.open { transform:rotate(90deg); }
    .tool-card-body { padding:8px 10px; border-top:1px solid var(--border); font-size:12px; font-family:'JetBrains Mono',monospace; white-space:pre-wrap; max-height:300px; overflow:auto; display:none; background:var(--input-bg); }
    .tool-card-body.open { display:block; }

    /* Tool approval */
    .tool-approval { display:flex; gap:6px; padding:6px 10px; border-top:1px solid var(--border); }
    .tool-approval button { padding:4px 12px; border-radius:4px; border:none; font-size:11px; cursor:pointer; font-weight:500; }
    .tool-approval .accept-btn { background:var(--success-fg); color:#fff; }
    .tool-approval .accept-btn:hover { filter:brightness(1.2); }
    .tool-approval .reject-btn { background:var(--error-fg); color:#fff; }
    .tool-approval .reject-btn:hover { filter:brightness(1.2); }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* ─── TYPING ─── */
    #typing { display:none; align-items:center; gap:6px; padding:4px 12px; color:var(--text-dim); font-size:12px; flex-shrink:0; }
    #typing.show { display:flex; }
    .dots { display:flex; gap:3px; }
    .dots span { width:5px; height:5px; background:var(--text-dim); border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
    .dots span:nth-child(1) { animation-delay:-0.32s; }
    .dots span:nth-child(2) { animation-delay:-0.16s; }
    @keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }

    /* ─── SLASH COMMANDS ─── */
    #slash-popup { display:none; position:absolute; bottom:100%; left:12px; background:var(--card-bg); border:1px solid var(--border); border-radius:6px; box-shadow:0 4px 12px rgba(0,0,0,.3); max-height:180px; overflow-y:auto; min-width:200px; z-index:10; }
    #slash-popup.show { display:block; }
    .slash-item { padding:6px 10px; cursor:pointer; font-size:12px; display:flex; gap:8px; align-items:center; }
    .slash-item:hover { background:var(--hover-bg); }
    .slash-item .key { font-weight:600; color:var(--accent); }
    .slash-item .desc { color:var(--text-muted); }

    /* ─── INPUT ─── */
    #input-area { position:relative; display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border); flex-shrink:0; align-items:flex-end; }
    #input { flex:1; background:var(--input-bg); color:var(--input-fg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; font-family:inherit; resize:none; outline:none; min-height:36px; max-height:120px; line-height:1.4; }
    #input:focus { border-color:var(--accent); }
    #input::placeholder { color:var(--text-dim); }
    #send-btn { width:36px; height:36px; border:none; background:var(--accent); color:var(--accent-fg); border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s; }
    #send-btn:hover { background:var(--accent-hover); }
    #send-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ─── SETTINGS ─── */
    #settings-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
    #settings-overlay.open { display:flex; }
    #settings-panel { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:20px; min-width:300px; max-width:400px; max-height:80vh; overflow-y:auto; }
    #settings-panel h2 { font-size:14px; font-weight:600; margin-bottom:12px; }
    .setting-row { margin-bottom:10px; }
    .setting-row label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:4px; }
    .setting-row input, .setting-row select { width:100%; background:var(--input-bg); color:var(--input-fg); border:1px solid var(--border); border-radius:4px; padding:6px 8px; font-size:12px; font-family:inherit; }
    .setting-row input:focus, .setting-row select:focus { border-color:var(--accent); outline:none; }
    #settings-close { float:right; background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <h3>Sessions</h3>
    <div id="session-list"></div>
    <div id="new-session-btn">+ New session</div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Header -->
    <div id="header">
      <button id="sidebar-toggle" title="Toggle sidebar">☰</button>
      <div class="logo">⚡</div>
      <h1>Pulse Agent</h1>
      <div id="mode-tabs">
        <button class="mode-tab active" data-mode="chat">Chat</button>
        <button class="mode-tab" data-mode="plan">Plan</button>
        <button class="mode-tab" data-mode="agent">Agent</button>
      </div>
      <select id="model-select">
        <option value="openrouter/free">openrouter/free</option>
        <option value="auto/fast">auto/fast</option>
        <option value="auto/best-reasoning">auto/best-reasoning</option>
        <option value="auto/best-fast">auto/best-fast</option>
      </select>
      <button id="settings-btn" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;">⚙</button>
    </div>

    <!-- Messages -->
    <div id="messages"></div>

    <!-- Typing -->
    <div id="typing"><div class="dots"><span></span><span></span><span></span></div> Pulse is thinking...</div>

    <!-- Slash popup -->
    <div id="slash-popup">
      <div class="slash-item" data-cmd="code"><span class="key">/code</span> <span class="desc">Generate code</span></div>
      <div class="slash-item" data-cmd="explain"><span class="key">/explain</span> <span class="desc">Explain code</span></div>
      <div class="slash-item" data-cmd="test"><span class="key">/test</span> <span class="desc">Generate tests</span></div>
      <div class="slash-item" data-cmd="refactor"><span class="key">/refactor</span> <span class="desc">Refactor code</span></div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <textarea id="input" rows="1" placeholder="Ask Pulse anything...  ( / for commands )" autofocus></textarea>
      <button id="send-btn" disabled>➤</button>
    </div>
  </div>
</div>

<!-- Settings panel -->
<div id="settings-overlay">
  <div id="settings-panel">
    <button id="settings-close">✕</button>
    <h2>Settings</h2>
    <div class="setting-row">
      <label>Model</label>
      <select id="set-model">
        <option value="openrouter/free">openrouter/free</option>
        <option value="auto/fast">auto/fast</option>
        <option value="auto/best-reasoning">auto/best-reasoning</option>
        <option value="auto/best-fast">auto/best-fast</option>
      </select>
    </div>
    <div class="setting-row">
      <label>API Key</label>
      <input id="set-apikey" type="password" placeholder="sk-or-v1-..." />
    </div>
    <div class="setting-row">
      <label>API Base URL</label>
      <input id="set-baseurl" placeholder="https://openrouter.ai/api/v1" />
    </div>
  </div>
</div>

<script>
const vscode = acquireVsCodeApi();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const typingEl = document.getElementById('typing');
const modelSelect = document.getElementById('model-select');
const sidebar = document.getElementById('sidebar');
const sessionList = document.getElementById('session-list');
const modeTabs = document.querySelectorAll('.mode-tab');
const slashPopup = document.getElementById('slash-popup');
const settingsOverlay = document.getElementById('settings-overlay');

let isProcessing = false;
let currentMode = 'chat';
let currentSessionId = crypto.randomUUID();
let sessions = [];
let toolCallResolve = null;
let pendingToolCall = null;

// ─── Input auto-resize ───
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || isProcessing;
  handleSlashInput();
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (e.key === 'Escape') slashPopup.classList.remove('show');
  if (e.key === 'Tab' && slashPopup.classList.contains('show')) {
    e.preventDefault();
    const first = slashPopup.querySelector('.slash-item');
    if (first) insertSlash(first.dataset.cmd);
  }
});
inputEl.addEventListener('blur', () => setTimeout(() => slashPopup.classList.remove('show'), 200));

function handleSlashInput() {
  const val = inputEl.value;
  if (val === '/') { slashPopup.classList.add('show'); return; }
  if (!val.startsWith('/') || val.includes(' ')) { slashPopup.classList.remove('show'); return; }
  const partial = val.substring(1).toLowerCase();
  slashPopup.querySelectorAll('.slash-item').forEach(el => {
    el.style.display = el.dataset.cmd.startsWith(partial) ? 'flex' : 'none';
  });
  slashPopup.classList.add('show');
}

function insertSlash(cmd) {
  inputEl.value = '/' + cmd + ' ';
  inputEl.focus();
  slashPopup.classList.remove('show');
  sendBtn.disabled = false;
}

slashPopup.querySelectorAll('.slash-item').forEach(el => {
  el.addEventListener('click', () => insertSlash(el.dataset.cmd));
});

// ─── Send ───
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isProcessing) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  slashPopup.classList.remove('show');

  addMessage('user', text, 'You');
  isProcessing = true;
  typingEl.classList.add('show');

  vscode.postMessage({ messageType: 'chatMessage', messageId: crypto.randomUUID(), data: { text, sessionId: currentSessionId, mode: currentMode } });
}

// ─── Add message ───
function addMessage(role, content, label) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const labelEl = document.createElement('span');
  labelEl.className = 'role-label';
  labelEl.textContent = label || (role === 'user' ? 'You' : 'Pulse');
  div.appendChild(labelEl);
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.textContent = content;
  div.appendChild(contentEl);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  if (role === 'assistant') {
    const copyBtn = document.createElement('button');
    copyBtn.textContent = '📋';
    copyBtn.title = 'Copy';
    copyBtn.onclick = () => navigator.clipboard.writeText(content);
    actions.appendChild(copyBtn);
  }
  div.appendChild(actions);

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── Add tool card ───
function addToolCall(toolName, args, status) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.dataset.toolName = toolName;

  const header = document.createElement('div');
  header.className = 'tool-card-header';
  header.innerHTML = `<span class="tool-card-status ${status}"></span><span class="tool-card-name">${toolName}</span><span class="tool-card-duration"></span><span class="tool-card-arrow">▶</span>`;
  header.onclick = () => {
    const body = card.querySelector('.tool-card-body');
    const arrow = card.querySelector('.tool-card-arrow');
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  };

  const body = document.createElement('div');
  body.className = 'tool-card-body';
  body.textContent = JSON.stringify(args, null, 2);

  card.appendChild(header);
  card.appendChild(body);

  // Approval buttons for pending tool calls
  if (status === 'pending') {
    const approval = document.createElement('div');
    approval.className = 'tool-approval';
    const acceptBtn = document.createElement('button');
    acceptBtn.className = 'accept-btn';
    acceptBtn.textContent = '✓ Accept';
    acceptBtn.onclick = () => {
      card.querySelector('.tool-card-status').className = 'tool-card-status running';
      approval.remove();
      if (toolCallResolve) toolCallResolve(true);
    };
    const rejectBtn = document.createElement('button');
    rejectBtn.className = 'reject-btn';
    rejectBtn.textContent = '✕ Reject';
    rejectBtn.onclick = () => {
      card.querySelector('.tool-card-status').className = 'tool-card-status error';
      approval.remove();
      if (toolCallResolve) toolCallResolve(false);
    };
    approval.appendChild(acceptBtn);
    approval.appendChild(rejectBtn);
    card.appendChild(approval);
  }

  messagesEl.appendChild(card);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return card;
}

function updateToolCallStatus(toolName, status, duration, result) {
  const cards = messagesEl.querySelectorAll('.tool-card');
  for (const card of cards) {
    if (card.dataset.toolName === toolName) {
      card.querySelector('.tool-card-status').className = 'tool-card-status ' + status;
      if (duration) card.querySelector('.tool-card-duration').textContent = duration + 'ms';
      if (result) card.querySelector('.tool-card-body').textContent = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
      break;
    }
  }
}

// ─── Mode switching ───
modeTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    modeTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    addMessage('system', 'Switched to ' + currentMode + ' mode');
  });
});

// ─── Model selector ───
modelSelect.addEventListener('change', () => {
  vscode.postMessage({ messageType: 'config/setModel', messageId: crypto.randomUUID(), data: { model: modelSelect.value } });
});

// ─── Sidebar ───
document.getElementById('sidebar-toggle').addEventListener('click', () => sidebar.classList.toggle('open'));
document.getElementById('new-session-btn').addEventListener('click', () => {
  currentSessionId = crypto.randomUUID();
  messagesEl.innerHTML = '';
  addMessage('system', 'New session started');
});

// ─── Settings ───
document.getElementById('settings-btn').addEventListener('click', () => settingsOverlay.classList.add('open'));
document.getElementById('settings-close').addEventListener('click', () => settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('open'); });

document.getElementById('set-model').addEventListener('change', (e) => {
  modelSelect.value = e.target.value;
  vscode.postMessage({ messageType: 'config/setModel', messageId: crypto.randomUUID(), data: { model: e.target.value } });
});
document.getElementById('set-apikey').addEventListener('change', (e) => {
  vscode.postMessage({ messageType: 'config/setApiKey', messageId: crypto.randomUUID(), data: { apiKey: e.target.value } });
});

// ─── Handle messages from extension ───
window.addEventListener('message', (event) => {
  const msg = event.data;
  if (!msg || !msg.messageType) return;

  if (msg.messageType === 'chatResponse') {
    isProcessing = false;
    typingEl.classList.remove('show');
    sendBtn.disabled = !inputEl.value.trim();
    const data = msg.data || {};
    const content = data.content || data.text || '(no response)';
    addMessage('assistant', content, 'Pulse');
  } else if (msg.messageType === 'chatError') {
    isProcessing = false;
    typingEl.classList.remove('show');
    sendBtn.disabled = !inputEl.value.trim();
    addMessage('system', '⚠️ Error: ' + (msg.data?.error || 'Unknown error'));
  } else if (msg.messageType === 'toolCall') {
    const tool = msg.data || {};
    addToolCall(tool.name || 'unknown', tool.arguments || {}, 'pending');
  } else if (msg.messageType === 'toolResult') {
    const tool = msg.data || {};
    updateToolCallStatus(tool.name, tool.status || 'success', tool.duration, tool.result);
  } else if (msg.messageType === 'toolApprovalRequest') {
    // Create a tool card with approval buttons
    addToolCall(msg.data?.name || 'unknown', msg.data?.arguments || {}, 'pending');
    // The acceptance/resolution is handled by the tool card buttons
  } else if (msg.messageType === 'configUpdate') {
    const config = msg.data?.result?.config || msg.data?.config;
    if (config?.models?.[0]) {
      const model = config.models[0];
      modelSelect.value = model.model || 'openrouter/free';
      document.getElementById('set-model').value = model.model || 'openrouter/free';
      if (model.apiKey) document.getElementById('set-apikey').value = model.apiKey;
    }
  } else if (msg.messageType === 'sessionList') {
    sessions = msg.data || [];
    renderSessionList();
  }
});

function renderSessionList() {
  sessionList.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    div.textContent = s.title || s.id?.substring(0, 8) || 'Session';
    div.onclick = () => {
      currentSessionId = s.id;
      vscode.postMessage({ messageType: 'session/load', messageId: crypto.randomUUID(), data: { id: s.id } });
    };
    sessionList.appendChild(div);
  });
}

// ─── Init ───
vscode.postMessage({ messageType: 'ping', messageId: 'init', data: null });
</script>
</body>
</html>
